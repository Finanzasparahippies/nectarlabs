services:
  nectar-db-staging:
    image: postgres:16-alpine
    container_name: nectar_db_staging
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data/:z
    environment:
      - POSTGRES_DB=nectarlabs_staging
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - prod_network

  backend:
    container_name: nectar_backend
    image: nectar-labs-backend:dev
    build: ./backend
    volumes:
      - ./backend:/app:z
    env_file:
      - .env
    environment:
      - DEBUG=True
      - ENVIRONMENT=local
    ports:
      - "8001:8000"
    depends_on:
      - nectar-db-staging
    networks:
      - prod_network

  frontend:
    container_name: nectar_frontend
    image: nectar-labs-frontend:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules
      - /app/.next
    ports:
      - "3002:3000"
    env_file:
      - .env.staging
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - API_URL=http://backend:8000/api
      - NEXT_DISABLE_SOURCEMAPS=0
    networks:
      - prod_network

  nginx:
    container_name: nectar_nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,z
      # Montamos los estáticos si se requieren servir por nginx
      - ./backend/staticfiles:/app/staticfiles:z
      - ./backend/media:/app/media:z
    depends_on:
      - backend
      - frontend
    networks:
      - prod_network

volumes:
  postgres_data_staging:

networks:
  prod_network:
    external: true
    name: prod_network
