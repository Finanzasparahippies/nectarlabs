services:
  backend:
    container_name: nectar_backend
    image: nectar-labs-backend:dev
    build: ./backend
    volumes:
      - ./backend:/app:z
    env_file:
      - .env
    environment:
      - DEBUG=True
      - ENVIRONMENT=local
    ports:
      - "8001:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/addons/')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - prod_network

  frontend:
    container_name: nectar_frontend
    image: nectar-labs-frontend:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules
      - /app/.next
    ports:
      - "3002:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env.staging
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - API_URL=http://backend:8000/api
      - NEXT_DISABLE_SOURCEMAPS=0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - prod_network

  nginx:
    container_name: nectar_nginx
    image: nginx:alpine
    ports:
      - "80:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,z
      # Montamos los estáticos si se requieren servir por nginx
      - ./backend/staticfiles:/app/staticfiles:z
      - ./backend/media:/app/media:z
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    command: >
      /bin/sh -c "
      NS=$$(awk '/nameserver/ {print $$2; exit}' /etc/resolv.conf);
      [ -z \"$$NS\" ] && NS=\"127.0.0.11\";
      echo \"resolver $$NS valid=5s;\" > /etc/nginx/conf.d/resolver.conf &&
      exec nginx -g 'daemon off;'
      "
    networks:
      - prod_network

  redis:
    container_name: nectar_redis
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - prod_network

  realtime:
    container_name: nectar_realtime
    image: nectar-labs-realtime:dev
    build: ./realtime
    volumes:
      - ./realtime:/app:z
      - /app/node_modules
    env_file:
      - .env
    environment:
      - PORT=4000
      - DJANGO_SECRET_KEY=${SECRET_KEY}
    ports:
      - "4000:4000"
    depends_on:
      - redis
    networks:
      - prod_network

networks:
  prod_network:
    external: true
    name: prod_network
