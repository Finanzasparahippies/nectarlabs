server {
    listen 80;
    server_name nectarlabs.dev www.nectarlabs.dev;

    resolver 127.0.0.11 valid=30s;
    set $backend_url http://backend:8000;
    set $frontend_url http://frontend:3000;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
        allow all;
    }

    # Next.js frontend
    location / {
        proxy_pass $frontend_url;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Django backend
    location ~ ^/(api|admin) {
        proxy_pass $backend_url;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Static and media files
    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}

# HTTPS Server (Uncomment after running certbot)
server {
    listen 443 ssl;
    server_name nectarlabs.dev www.nectarlabs.dev;

    resolver 127.0.0.11 valid=30s;
    set $backend_url http://backend:8000;
    set $frontend_url http://frontend:3000;

    ssl_certificate /etc/letsencrypt/live/nectarlabs.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nectarlabs.dev/privkey.pem;

    location / {
        proxy_pass $frontend_url;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location ~ ^/(api|admin) {
        proxy_pass $backend_url;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}
