# DNS del resolver interno de Docker con IPv6 desactivado
resolver 127.0.0.11 valid=30s ipv6=off;

# Cabeceras comunes para WebSocket proxying
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- REDIRECT HTTP TO HTTPS ---
server {
    listen 80;
    server_name finanzasparahippies.com www.finanzasparahippies.com nectarlabs.dev www.nectarlabs.dev *.nectarlabs.dev losplacosones.nectarlabs.dev www.losplacosones.nectarlabs.dev staging.nectarlabs.dev www.staging.nectarlabs.dev;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- FINANZAS PARA HIPPIES (HTTPS) ---
server {
    listen 443 ssl;
    server_name finanzasparahippies.com www.finanzasparahippies.com;

    ssl_certificate /etc/letsencrypt/live/finanzasparahippies.com-0003/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finanzasparahippies.com-0003/privkey.pem;

    set $fph_be http://fph_backend:8000;
    set $fph_fe http://fph_frontend:3000;

    location ^~ /static/ { alias /app/fph_static/; }
    location ^~ /media/ { alias /app/fph_media/; }

    location ~ ^/(api|admin) {
        proxy_pass $fph_be;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        proxy_pass $fph_fe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- NECTAR LABS (HTTPS) ---
server {
    listen 443 ssl;
    server_name nectarlabs.dev www.nectarlabs.dev *.nectarlabs.dev;

    ssl_certificate /etc/letsencrypt/live/nectarlabs.dev-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nectarlabs.dev-0001/privkey.pem;

    set $nectar_be http://nectar_backend:8000;
    set $nectar_fe http://nectar_frontend:3000;
    set $nectar_rt http://nectar_realtime_prod:4000; # Nuevo contenedor de producción en tiempo real

    location ^~ /static/ { alias /app/nectar_static/; }
    location ^~ /media/ { alias /app/nectar_media/; }

    location ~ ^/(api|admin) {
        proxy_pass $nectar_be;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Ruta de WebSockets para Néctar Labs Producción
    location /ws/ {
        proxy_pass $nectar_rt;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        proxy_pass $nectar_fe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

