    set $nectar_fe_staging http://nectar_frontend_staging:3000;
    set $nectar_rt_staging http://nectar_realtime_staging:4000; # Nuevo contenedor de staging en tiempo real

    location ~ ^/(api|admin|static|media) {
        proxy_pass $nectar_be_staging;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ruta de WebSockets para Néctar Labs Staging
    location /ws/ {
        proxy_pass $nectar_rt_staging;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        proxy_pass $nectar_fe_staging;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- STAGING HTTP BYPASS ---
server {
    listen 80;
    server_name staging.nectarlabs.dev www.staging.nectarlabs.dev *.staging.nectarlabs.dev;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Bypass HTTP de WebSockets para pruebas locales de subdominios
    location /ws/ {
        set $nectar_rt_staging_http http://nectar_realtime_staging:4000;
        proxy_pass $nectar_rt_staging_http;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        set $nectar_fe_staging_http http://nectar_frontend_staging:3000;
        proxy_pass $nectar_fe_staging_http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
