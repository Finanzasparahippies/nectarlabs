server {
    listen 80;
    
    # DNS del resolver interno de Docker
    resolver 127.0.0.11 valid=30s;

    # Definir upstreams como variables para evitar crash si el host no existe al iniciar
    set $backend_url http://backend:8000;
    set $frontend_url http://frontend:3000;

    # Backend API
    location /api/ {
        proxy_pass $backend_url;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Django Admin
    location /admin/ {
        proxy_pass $backend_url;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Static Files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media Files
    location /media/ {
        alias /app/media/;
    }

    # Frontend
    location / {
        proxy_pass $frontend_url;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        
        # Enable hot reloading for development
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
